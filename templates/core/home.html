{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <h1 class="display-4 mb-4">Welcome to NationView</h1>
        <p class="lead mb-5">Empowering every citizen with transparency and trust.</p>
        
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg px-4">Go to Dashboard</a>
        {% else %}
            <a href="{% url 'register' %}" class="btn btn-primary btn-lg px-4">Get Started</a>
        {% endif %}
    </div>
</div>
{% endblock %}
